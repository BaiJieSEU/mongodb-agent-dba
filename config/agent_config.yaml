mongodb:
  agent_store: "mongodb://localhost:27017"
  monitored_cluster: "mongodb://localhost:27020/?replicaSet=ecommerceRS&directConnection=true"   # backward-compat; mirrors clusters[0]
  monitored_clusters:
    - name: "ecommerceRS"
      uri: "mongodb://localhost:27020/?replicaSet=ecommerceRS&directConnection=true"
      tags:
        - gcp
    - name: "analyticsRS"
      uri: "mongodb://localhost:27021/?replicaSet=analyticsRS&directConnection=true"
      tags:
        - gcp
    - name: "crmRS"
      uri: "mongodb://localhost:27022/?replicaSet=crmRS&directConnection=true"
      tags:
        - gcp

llm:
  # Active provider: ollama | anthropic | vertex_ai | bedrock | azure_openai
  # Override at runtime: AGENT_LLM_PROVIDER=anthropic
  provider: "ollama"

  ollama:
    base_url: "http://localhost:11434"
    model: "qwen3:8b"
    temperature: 0.1

  anthropic:
    # Credentials: AGENT_ANTHROPIC_API_KEY (or ANTHROPIC_API_KEY)
    model: "claude-sonnet-4-6"
    temperature: 0.1

  vertex_ai:
    # Credentials: GOOGLE_APPLICATION_CREDENTIALS + GOOGLE_CLOUD_PROJECT
    project: ""              # GCP project ID
    location: "us-central1"
    model: "gemini-2.0-flash-001"
    temperature: 0.1

  bedrock:
    # Credentials: standard AWS env vars (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
    model_id: "anthropic.claude-3-sonnet-20240229-v1:0"
    region: "us-east-1"
    temperature: 0.1

  azure_openai:
    # Credentials: AGENT_AZURE_OPENAI_KEY (or AZURE_OPENAI_API_KEY)
    endpoint: ""          # e.g. https://my-resource.openai.azure.com/
    deployment: ""        # e.g. gpt-4o
    api_version: "2024-02-15-preview"
    temperature: 0.1

agent:
  slow_query_threshold_ms: 5
  max_queries_to_analyze: 10
  investigation_timeout: 60
  llm_recommendations: true   # BL-034: enrich health check recommendations with LLM

# Health check severity thresholds (BL-021).
# Tune these to match your cluster's SLAs. Defaults reflect MongoDB best practices.
thresholds:
  # Query Performance
  slow_query_pct_warning: 5.0        # slow queries > N% of profiled queries → warning
  slow_query_pct_critical: 20.0      # slow queries > N% of profiled queries → critical
  slow_query_ms_warning: 100         # query > Nms → warning
  slow_query_ms_critical: 500        # query > Nms → critical

  # Replication Health
  oplog_window_warning_hours: 24     # oplog covers < Nh → warning
  oplog_window_critical_hours: 4     # oplog covers < Nh → critical

  # Storage & Capacity
  disk_used_pct_warning: 80          # disk > N% → warning
  disk_used_pct_critical: 90         # disk > N% → critical

  # Operations — WiredTiger cache
  cache_hit_ratio_warning: 0.95      # hit ratio < N → warning  (95%)
  cache_hit_ratio_critical: 0.80     # hit ratio < N → critical (80%)

  # Operations — lock contention
  lock_wait_pct_warning: 5.0         # lock wait > N% → warning
  lock_wait_pct_critical: 20.0       # lock wait > N% → critical

  # Operations — query targeting (scanned-to-returned ratio)
  query_targeting_warning: 10.0      # ratio > N → warning
  query_targeting_critical: 100.0    # ratio > N → critical

  # Operations — memory
  memory_resident_warning_mb: 4096   # RSS > N MB → warning
  memory_resident_critical_mb: 8192  # RSS > N MB → critical

  # Connections & Concurrency
  connections_warning: 500           # total connections > N → warning
  tickets_warning: 10                # remaining WT tickets < N → warning
  lock_queue_warning: 10             # queued lock waiters > N → warning

  # Infrastructure
  cpu_user_pct_warning: 80.0         # CPU user% > N → warning
  cpu_iowait_pct_warning: 10.0       # iowait% > N → warning
  disk_write_latency_warning_ms: 10.0 # write latency > Nms → warning
  system_memory_used_pct_warning: 90.0 # system RAM used > N% → warning

  # Index analysis (not severity — controls which queries are flagged)
  full_scan_examined_min: 1000       # min docs examined to flag a COLLSCAN
  full_scan_selectivity_max: 0.01    # max returned/examined ratio to flag (1%)

